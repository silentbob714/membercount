name: Discord Snapshot Collector

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Discord Data & Store
        run: |
    echo "Invite: $INVITE"
    
      curl -s "https://discord.com/api/v10/invites/${INVITE}?with_counts=true" > data.json
      
      cat data.json
      
      MEMBERS=$(jq '.approximate_member_count' data.json)
      ONLINE=$(jq '.approximate_presence_count' data.json)

      curl -X POST "${SUPABASE_URL}/rest/v1/discord_snapshots" \
      -H "apikey: ${SUPABASE_KEY}" \
      -H "Authorization: Bearer ${SUPABASE_KEY}" \
      -H "Content-Type: application/json" \
      -d "{
        \"guild_id\": \"${GUILD_ID}\",
        \"members\": $MEMBERS,
        \"online\": $ONLINE
      }"

    env:
      INVITE: ${{ secrets.INVITE }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GUILD_ID: ${{ secrets.GUILD_ID }}
