<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Discord Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:#0b0d12;
  color:white;
  overflow-x:hidden;
}

/* glow background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(88,101,242,0.25), transparent 35%),
    radial-gradient(circle at 80% 70%, rgba(0,212,255,0.18), transparent 40%);
  pointer-events:none;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

/* HEADER */
.hero{
  display:flex;
  align-items:center;
  gap:18px;
  padding:22px;
  border-radius:18px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.hero img{
  width:70px;
  height:70px;
  border-radius:18px;
}

.hero h1{
  margin:0;
  font-size:28px;
  letter-spacing:-0.5px;
}

.status{
  margin-top:6px;
  font-size:13px;
  opacity:0.7;
}

.pill{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:#2ecc71;
  color:black;
  font-size:12px;
  margin-left:10px;
}

/* GRID */
.grid{
  margin-top:25px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

.card{
  padding:18px;
  border-radius:16px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  transition:0.2s ease;
}

.card:hover{
  transform:translateY(-3px);
  background:rgba(255,255,255,0.06);
}

.card-title{
  font-size:13px;
  opacity:0.6;
}

.card-value{
  font-size:34px;
  font-weight:700;
  margin-top:10px;
}

/* CHART */
.chart{
  margin-top:25px;
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
}

canvas{
  width:100%;
  height:320px;
}

</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <img id="serverIcon" />
    <div>
      <h1 id="serverName">Loading...</h1>
      <div class="status">
        Live Discord Analytics
        <span class="pill" id="liveText">CONNECTING</span>
      </div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-title">Total Members</div>
      <div class="card-value" id="members">-</div>
    </div>

    <div class="card">
      <div class="card-title">Online</div>
      <div class="card-value" id="online">-</div>
    </div>

    <div class="card">
      <div class="card-title">Peak</div>
      <div class="card-value" id="peak">-</div>
    </div>
  </div>

  <div class="chart">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>

/* CONFIG */
const SUPABASE_URL = "https://xyskshqnljcazroqtlnr.supabase.co";
const SUPABASE_KEY = "sb_publishable_vVuIoCNeJAFwWOpEiqaqIQ_ApPGsIES";

/* CLIENT */
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let cache = [];

/* BOOT */
window.addEventListener("DOMContentLoaded", async () => {
  await loadGuild();
  await load();
  setInterval(load, 10000);
});

/* GUILD */
async function loadGuild(){

  const { data, error } = await supabase
    .from("discord_guild")
    .select("*")
    .limit(1);

  if(error){
    console.error(error);
    return;
  }

  if(!data?.length) return;

  const g = data[0];

  document.getElementById("serverName").innerText = g.name || "Unknown";

  if(g.icon && g.id){
    document.getElementById("serverIcon").src =
      `https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png`;
  }
}

/* SNAPSHOTS */
async function load(){

  const { data, error } = await supabase
    .from("discord_snapshots")
    .select("*")
    .order("created_at", { ascending:true });

  if(error){
    console.error("Snapshot error:", error);
    return;
  }

  if(!data || !data.length){
    setValues(0,0,0);
    return;
  }

  cache = data;

  const latest = data[data.length - 1];

  const members = latest.members ?? 0;
  const online = latest.online ?? 0;

  const peak = Math.max(...data.map(d => d.members || 0));

  setValues(members, online, peak);
  draw(data);
}

/* UI */
function setValues(m,o,p){

  animate("members", m);
  animate("online", o);
  animate("peak", p);
}

/* ANIMATION */
function animate(id, target){

  const el = document.getElementById(id);
  if(!el) return;

  const start = parseInt(el.innerText.replace(/,/g,'')) || 0;
  const diff = target - start;

  const t0 = performance.now();

  function step(t){
    const p = Math.min((t - t0) / 500, 1);
    el.innerText = Math.floor(start + diff * p).toLocaleString();
    if(p < 1) requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

/* CHART */
function draw(data){

  const c = document.getElementById("chart");
  const ctx = c.getContext("2d");

  c.width = c.offsetWidth;
  c.height = 320;

  ctx.clearRect(0,0,c.width,c.height);

  if(data.length < 2) return;

  const vals = data.map(d => d.members || 0);

  const max = Math.max(...vals);
  const min = Math.min(...vals);

  ctx.beginPath();

  data.forEach((d,i)=>{

    const x = (i/(data.length-1))*c.width;
    const y = c.height - ((d.members-min)/((max-min)||1))*c.height;

    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.strokeStyle = "#5865f2";
  ctx.lineWidth = 2;
  ctx.stroke();
}

</script>

</body>
</html>
