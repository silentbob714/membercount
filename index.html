<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Discord Live Stats</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      min-height: 100vh;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;

      background:
        radial-gradient(circle at top, #5865f2 0%, #1b1d23 45%, #0f1013 100%);

      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }

    .background-glow {
      position: absolute;
      width: 900px;
      height: 900px;

      background: radial-gradient(
        circle,
        rgba(88,101,242,0.18) 0%,
        rgba(88,101,242,0) 70%
      );

      animation: rotate 18s linear infinite;
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .card {
      position: relative;
      z-index: 2;

      width: 90%;
      max-width: 850px;

      background: rgba(255,255,255,0.06);

      border: 1px solid rgba(255,255,255,0.08);

      backdrop-filter: blur(16px);

      border-radius: 32px;

      padding: 42px;

      box-shadow:
        0 15px 60px rgba(0,0,0,0.45),
        inset 0 0 40px rgba(255,255,255,0.03);
    }

    .top {
      display: flex;
      align-items: center;
      gap: 22px;

      margin-bottom: 35px;
    }

    .icon {
      width: 110px;
      height: 110px;

      border-radius: 50%;

      border: 4px solid rgba(255,255,255,0.15);

      object-fit: cover;

      box-shadow: 0 0 30px rgba(88,101,242,0.5);
    }

    .server-info h1 {
      font-size: 42px;
      margin-bottom: 8px;
    }

    .server-info p {
      opacity: 0.7;
      font-size: 16px;
      line-height: 1.5;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;

      margin-top: 30px;
    }

    .stat-box {
      background: rgba(255,255,255,0.04);

      border: 1px solid rgba(255,255,255,0.06);

      border-radius: 24px;

      padding: 28px;

      text-align: center;
    }

    .stat-label {
      font-size: 15px;
      letter-spacing: 2px;
      opacity: 0.65;
      margin-bottom: 15px;
    }

    .stat-number {
      font-size: 54px;
      font-weight: 900;
    }

    .online-dot {
      width: 12px;
      height: 12px;
      background: #57f287;

      border-radius: 50%;

      display: inline-block;

      margin-right: 8px;

      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.5);
        opacity: 0.5;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .graph-container {
      margin-top: 40px;
    }

    .graph-title {
      font-size: 18px;
      margin-bottom: 15px;
      opacity: 0.75;
    }

    canvas {
      width: 100%;
      height: 240px;

      background: rgba(255,255,255,0.03);

      border-radius: 18px;

      border: 1px solid rgba(255,255,255,0.06);
    }

    .footer {
      margin-top: 25px;
      opacity: 0.45;
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 700px) {
      .top {
        flex-direction: column;
        text-align: center;
      }

      .server-info h1 {
        font-size: 32px;
      }

      .stat-number {
        font-size: 42px;
      }
    }
  </style>
</head>

<body>

  <div class="background-glow"></div>

  <div class="card">

    <div class="top">
      <img id="serverIcon" class="icon" />

      <div class="server-info">
        <h1 id="serverName">Loading...</h1>
        <p id="serverDescription">
          Fetching Discord server data...
        </p>
      </div>
    </div>

    <div class="stats">

      <div class="stat-box">
        <div class="stat-label">
          TOTAL MEMBERS
        </div>

        <div class="stat-number" id="memberCount">
          ---
        </div>
      </div>

      <div class="stat-box">
        <div class="stat-label">
          ONLINE NOW
        </div>

        <div class="stat-number">
          <span class="online-dot"></span>
          <span id="onlineCount">---</span>
        </div>
      </div>

    </div>

    <div class="graph-container">
      <div class="graph-title">
        Live Member Trend
      </div>

      <canvas id="graph" width="800" height="240"></canvas>
    </div>

    <div class="footer">
      Live updating every 15 seconds
    </div>

  </div>

  <script>
    // ============================================
    // PUT YOUR DISCORD INVITE CODE HERE
    // Example:
    // https://discord.gg/abc123
    // becomes:
    // abc123
    // ============================================

    const inviteCode = "QCgdTmuWUA";

    // ============================================

    const memberEl = document.getElementById("memberCount");
    const onlineEl = document.getElementById("onlineCount");

    const iconEl = document.getElementById("serverIcon");
    const nameEl = document.getElementById("serverName");
    const descEl = document.getElementById("serverDescription");

    const canvas = document.getElementById("graph");
    const ctx = canvas.getContext("2d");

    let graphData = [];

    async function fetchDiscordStats() {
      try {

        const response = await fetch(
          `https://discord.com/api/v9/invites/${inviteCode}?with_counts=true`
        );

        const data = await response.json();

        const memberCount = data.approximate_member_count || 0;
        const onlineCount = data.approximate_presence_count || 0;

        // SERVER INFO

        nameEl.textContent = data.guild.name || "Unknown Server";

        descEl.textContent =
          data.guild.description ||
          "No server description available.";

        if (data.guild.icon) {
          iconEl.src =
            `https://cdn.discordapp.com/icons/${data.guild.id}/${data.guild.icon}.png`;
        }

        // ANIMATED NUMBERS

        animateNumber(
          memberEl,
          parseInt(memberEl.dataset.value || 0),
          memberCount
        );

        animateNumber(
          onlineEl,
          parseInt(onlineEl.dataset.value || 0),
          onlineCount
        );

        // GRAPH DATA

        graphData.push(memberCount);

        if (graphData.length > 40) {
          graphData.shift();
        }

        drawGraph();

      } catch (err) {
        console.error(err);

        nameEl.textContent = "Connection Error";
      }
    }

    function animateNumber(element, start, end) {

      const duration = 800;

      const startTime = performance.now();

      element.dataset.value = end;

      function update(currentTime) {

        const elapsed = currentTime - startTime;

        const progress = Math.min(elapsed / duration, 1);

        const value =
          Math.floor(start + (end - start) * progress);

        element.textContent =
          value.toLocaleString();

        if (progress < 1) {
          requestAnimationFrame(update);
        }
      }

      requestAnimationFrame(update);
    }

    function drawGraph() {

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (graphData.length < 2) return;

      const max = Math.max(...graphData);
      const min = Math.min(...graphData);

      const padding = 20;

      ctx.beginPath();

      ctx.lineWidth = 4;
      ctx.strokeStyle = "#5865f2";

      graphData.forEach((value, index) => {

        const x =
          (index / (graphData.length - 1)) * canvas.width;

        const y =
          canvas.height -
          (
            ((value - min) / ((max - min) || 1))
            * (canvas.height - padding * 2)
          ) -
          padding;

        if (index === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      });

      ctx.stroke();

      // FILL AREA

      ctx.lineTo(canvas.width, canvas.height);
      ctx.lineTo(0, canvas.height);
      ctx.closePath();

      const gradient = ctx.createLinearGradient(
        0,
        0,
        0,
        canvas.height
      );

      gradient.addColorStop(0, "rgba(88,101,242,0.45)");
      gradient.addColorStop(1, "rgba(88,101,242,0)");

      ctx.fillStyle = gradient;

      ctx.fill();
    }

    // ============================================
    // DEMO DATA BEFORE FIRST FETCH
    // Creates animated graph from high -> low
    // ============================================

    for (let i = 40; i >= 0; i--) {
      graphData.push(
        10000 - (i * 180) + Math.random() * 200
      );
    }

    drawGraph();

    // ============================================

    fetchDiscordStats();

    setInterval(fetchDiscordStats, 15000);

  </script>

</body>
</html>
