<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Discord Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b0d12;
  color:white;
}

.container{
  padding:30px;
}

.hero{
  padding:20px;
  background:#1a1d27;
  border-radius:16px;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.card{
  background:#171a22;
  padding:20px;
  border-radius:12px;
}

.card-value{
  font-size:32px;
  margin-top:10px;
}

canvas{
  width:100%;
  height:300px;
  background:#11131a;
  margin-top:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1 id="serverName">Loading...</h1>
    <img id="serverIcon" width="80" style="border-radius:12px"/>
    <div id="liveText">Connecting...</div>
  </div>

  <div class="grid">
    <div class="card">
      <div>Total Members</div>
      <div class="card-value" id="members">-</div>
    </div>

    <div class="card">
      <div>Online</div>
      <div class="card-value" id="online">-</div>
    </div>

    <div class="card">
      <div>Peak</div>
      <div class="card-value" id="peak">-</div>
    </div>
  </div>

  <canvas id="chart"></canvas>

</div>

<script>

/* =====================
   CONFIG
===================== */

const SUPABASE_URL = "https://xyskshqnljcazroqtlnr.supabase.co";
const SUPABASE_KEY = "sb_publishable_vVuIoCNeJAFwWOpEiqaqIQ_ApPGsIES"; // IMPORTANT FIX

const supabase =
  window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =====================
   STATE
===================== */

let snapshotCache = [];

/* =====================
   BOOT
===================== */

async function boot(){
  await loadGuildInfo();
  await loadSnapshots();

  setInterval(loadSnapshots, 10000);
}

window.addEventListener("DOMContentLoaded", boot);

/* =====================
   GUILD INFO
===================== */

async function loadGuildInfo(){

  const { data, error } =
    await supabase
      .from("discord_guild")
      .select("*")
      .limit(1);

  if(error){
    console.error("Guild error:", error);
    return;
  }

  if(!data || !data.length) return;

  const g = data[0];

  document.getElementById("serverName").innerText = g.name || "Unknown";

  if(g.icon && g.id){
    document.getElementById("serverIcon").src =
      `https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png?size=128`;
  }
}

/* =====================
   SNAPSHOTS
===================== */

async function loadSnapshots(){

  const { data, error } =
    await supabase
      .from("discord_snapshots")
      .select("*")
      .order("created_at", { ascending:true });

  if(error){
    console.error("Snapshot error:", error);
    return;
  }

  console.log("Snapshots:", data);

  snapshotCache = data || [];

  if(snapshotCache.length === 0){
    updateUI([], null);
    return;
  }

  updateUI(snapshotCache, snapshotCache[snapshotCache.length - 1]);
}

/* =====================
   SAFE UI UPDATE
===================== */

function updateUI(data, latest){

  if(!data || data.length === 0 || !latest){
    document.getElementById("members").innerText = "0";
    document.getElementById("online").innerText = "0";
    document.getElementById("peak").innerText = "0";
    return;
  }

  const members = latest.members ?? 0;
  const online = latest.online ?? 0;

  const peak = Math.max(
    ...data.map(d => Number(d.members || 0))
  );

  animateNumber("members", members);
  animateNumber("online", online);
  animateNumber("peak", peak);

  drawChart(data);
}

/* =====================
   ANIMATION
===================== */

function animateNumber(id, target){

  const el = document.getElementById(id);
  if(!el) return;

  const start =
    parseInt(el.innerText.replace(/,/g,"")) || 0;

  const diff = target - start;
  const duration = 500;
  const startTime = performance.now();

  function step(now){
    const progress =
      Math.min((now - startTime) / duration, 1);

    el.innerText =
      Math.floor(start + diff * progress).toLocaleString();

    if(progress < 1){
      requestAnimationFrame(step);
    }
  }

  requestAnimationFrame(step);
}

/* =====================
   CHART (SAFE)
===================== */

function drawChart(data){

  const canvas = document.getElementById("chart");
  if(!canvas) return;

  const ctx = canvas.getContext("2d");

  const width = canvas.offsetWidth || 800;

  canvas.width = width;
  canvas.height = 300;

  ctx.clearRect(0,0,width,300);

  if(!data || data.length < 2) return;

  const values = data.map(d => Number(d.members || 0));

  const max = Math.max(...values);
  const min = Math.min(...values);

  ctx.beginPath();

  data.forEach((d,i)=>{

    const x =
      (i / (data.length - 1)) * width;

    const y =
      300 -
      ((d.members - min) / ((max - min) || 1)) * 300;

    if(i === 0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);

  });

  ctx.strokeStyle = "#5865f2";
  ctx.lineWidth = 2;
  ctx.stroke();
}

</script>

</body>
</html>
