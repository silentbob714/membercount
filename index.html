<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MeshOS Discord Analytics Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Inter, Arial, sans-serif;
  background: radial-gradient(circle at top, #5865f2, #0f1115 55%);
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 100%;
  max-width: 1100px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 30px;
}

.icon {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.15);
}

.title h1 {
  font-size: 34px;
}

.title p {
  opacity: 0.7;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 18px;
  margin-bottom: 30px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 20px;
}

.card h3 {
  font-size: 13px;
  opacity: 0.7;
  letter-spacing: 2px;
}

.card .value {
  font-size: 36px;
  margin-top: 10px;
  font-weight: 700;
}

/* CHART */
.chartBox {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 20px;
}

canvas {
  width: 100%;
  height: 260px;
}

/* FOOTER */
.footer {
  margin-top: 20px;
  opacity: 0.5;
  font-size: 12px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <img id="icon" class="icon" />
    <div class="title">
      <h1 id="name">Loading Server...</h1>
      <p id="desc">MeshOS Discord analytics dashboard</p>
    </div>
  </div>

  <!-- STATS -->
  <div class="grid">
    <div class="card">
      <h3>TOTAL MEMBERS</h3>
      <div class="value" id="members">---</div>
    </div>

    <div class="card">
      <h3>ONLINE</h3>
      <div class="value" id="online">---</div>
    </div>

    <div class="card">
      <h3>PEAK (RECORDED)</h3>
      <div class="value" id="peak">---</div>
    </div>

    <div class="card">
      <h3>DAILY CHANGE</h3>
      <div class="value" id="delta">---</div>
    </div>
  </div>

  <!-- SNAPSHOT CHART -->
  <div class="chartBox">
    <h3 style="opacity:0.7;margin-bottom:10px;">Daily Member Snapshots</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="footer">
    Snapshot-based analytics (stored locally in your browser)
  </div>

</div>

<script>

const inviteCode = "QCgdTmuWUA";

const membersEl = document.getElementById("members");
const onlineEl = document.getElementById("online");
const peakEl = document.getElementById("peak");
const deltaEl = document.getElementById("delta");

const iconEl = document.getElementById("icon");
const nameEl = document.getElementById("name");
const descEl = document.getElementById("desc");

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = 1000;
canvas.height = 260;

// -------------------------
// STORAGE (daily snapshots)
// -------------------------
const STORAGE_KEY = "discord_snapshots_v1";

function loadSnapshots() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}

function saveSnapshots(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function addSnapshot(count) {
  const snapshots = loadSnapshots();

  const today = new Date().toISOString().split("T")[0];

  const last = snapshots[snapshots.length - 1];

  // only 1 snapshot per day
  if (!last || last.date !== today) {
    snapshots.push({
      date: today,
      members: count
    });

    // keep last 60 days
    if (snapshots.length > 60) snapshots.shift();

    saveSnapshots(snapshots);
  }

  return snapshots;
}

// -------------------------
// FETCH DISCORD DATA
// -------------------------
async function fetchData() {
  try {
    const res = await fetch(
      `https://discord.com/api/v10/invites/${inviteCode}?with_counts=true`
    );

    const data = await res.json();

    const members = data.approximate_member_count || 0;
    const online = data.approximate_presence_count || 0;

    // header
    nameEl.textContent = data.guild?.name || "Unknown Server";
    descEl.textContent = data.guild?.description || "Discord Analytics";

    if (data.guild?.icon) {
      iconEl.src =
        `https://cdn.discordapp.com/icons/${data.guild.id}/${data.guild.icon}.png`;
    }

    // stats
    membersEl.textContent = members.toLocaleString();
    onlineEl.textContent = online.toLocaleString();

    // snapshots
    const snapshots = addSnapshot(members);

    // peak
    const peak = Math.max(...snapshots.map(s => s.members));
    peakEl.textContent = peak.toLocaleString();

    // delta (today vs yesterday)
    if (snapshots.length > 1) {
      const last = snapshots[snapshots.length - 1];
      const prev = snapshots[snapshots.length - 2];

      const diff = last.members - prev.members;

      deltaEl.textContent =
        (diff >= 0 ? "+" : "") + diff.toLocaleString();
    } else {
      deltaEl.textContent = "0";
    }

    drawChart(snapshots);

  } catch (err) {
    console.error(err);
    nameEl.textContent = "API Error";
  }
}

// -------------------------
// SNAPSHOT CHART (STATIC)
// -------------------------
function drawChart(data) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (data.length < 2) return;

  const max = Math.max(...data.map(d => d.members));
  const min = Math.min(...data.map(d => d.members));

  ctx.beginPath();
  ctx.strokeStyle = "#5865f2";
  ctx.lineWidth = 3;

  data.forEach((d, i) => {
    const x = (i / (data.length - 1)) * canvas.width;

    const y =
      canvas.height -
      ((d.members - min) / ((max - min) || 1)) * canvas.height;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });

  ctx.stroke();
}

// -------------------------
// INIT
// -------------------------
fetchData();

// refresh every 10 min (not spammy)
setInterval(fetchData, 600000);

</script>

</body>
</html>
