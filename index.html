<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Discord Analytics Dashboard</title>

<style>

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:#0b0d12;
  color:white;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

/* HERO */
.hero{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px;
  border-radius:14px;
  background:#141826;
  border:1px solid rgba(255,255,255,0.06);
}

.hero-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.hero img{
  width:70px;
  height:70px;
  border-radius:14px;
  object-fit:cover;
}

.hero h1{
  margin:0;
  font-size:24px;
}

.badge{
  font-size:12px;
  opacity:0.7;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(88,101,242,0.15);
  border:1px solid rgba(88,101,242,0.3);
}

/* GRID */
.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

.card{
  background:#141826;
  padding:16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.05);
}

.card-title{
  font-size:12px;
  opacity:0.6;
}

.card-value{
  font-size:30px;
  margin-top:8px;
  font-weight:700;
}

.delta{
  font-size:12px;
  opacity:0.75;
  margin-top:6px;
}

/* CHART */
.chart{
  margin-top:20px;
  background:#141826;
  border-radius:12px;
  padding:16px;
  border:1px solid rgba(255,255,255,0.05);
  position:relative;
}

canvas{
  width:100%;
  height:340px;
  display:block;
}

</style>
</head>

<body>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-left">
      <img id="serverIcon" />
      <h1 id="serverName">Loading...</h1>
    </div>

    <div class="badge">
      Near Realtime Feed
    </div>
  </div>

  <!-- GRID -->
  <div class="grid">
    <div class="card">
      <div class="card-title">Members</div>
      <div class="card-value" id="members">-</div>
      <div class="delta" id="members_delta"></div>
    </div>

    <div class="card">
      <div class="card-title">Online</div>
      <div class="card-value" id="online">-</div>
      <div class="delta" id="online_delta"></div>
    </div>

    <div class="card">
      <div class="card-title">Peak</div>
      <div class="card-value" id="peak">-</div>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart">
    <canvas id="chart"></canvas>
  </div>

</div>

<!-- SUPABASE -->
<script type="module">

import { createClient } from "https://cdn.skypack.dev/@supabase/supabase-js@2";

const sb = createClient(
  "https://xyskshqnljcazroqtlnr.supabase.co",
  "sb_publishable_vVuIoCNeJAFwWOpEiqaqIQ_ApPGsIES"
);

let cache = [];

window.addEventListener("DOMContentLoaded", async () => {
  await loadGuild();
  await loadSnapshots();
  setInterval(loadSnapshots, 8000);
});

/* =========================
   GUILD
========================= */
async function loadGuild(){
  const { data } = await sb.from("discord_guild").select("*").limit(1);
  if(!data?.length) return;

  const g = data[0];

  document.getElementById("serverName").innerText = g.name;

  if(g.icon){
    document.getElementById("serverIcon").src =
      `https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png?size=128`;
  }
}

/* =========================
   SNAPSHOTS
========================= */
async function loadSnapshots(){

  const { data } = await sb
    .from("discord_snapshots")
    .select("*")
    .order("created_at", { ascending:true });

  if(!data?.length) return;

  cache = data;

  const current = data.at(-1);
  const previous = data.at(-2) || current;

  render(current, previous, cache);
}

/* =========================
   RENDER ENGINE
========================= */
function render(current, previous, all){

  const membersNow = current.members || 0;
  const membersPrev = previous.members || 0;

  const onlineNow = current.online || 0;
  const onlinePrev = previous.online || 0;

  const memberDelta = membersNow - membersPrev;
  const onlineDelta = onlineNow - onlinePrev;

  animate("members", membersNow);
  animate("online", onlineNow);

  animate("peak", Math.max(...all.map(d => d.members || 0)));

  showDelta("members", memberDelta);
  showDelta("online", onlineDelta);

  draw(all);
}

/* =========================
   ANIMATION
========================= */
function animate(id, target){

  const el = document.getElementById(id);
  const start = parseInt(el.innerText.replace(/,/g,'')) || 0;
  const diff = target - start;

  const t0 = performance.now();

  function step(t){
    const p = Math.min((t - t0) / 450, 1);
    el.innerText = Math.floor(start + diff * p).toLocaleString();
    if(p < 1) requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

/* =========================
   DELTAS (UPDATED TEXT)
========================= */
function showDelta(id, delta){

  const el = document.getElementById(id + "_delta");

  if(delta > 0){
    el.innerText = `since last update +${delta}`;
    el.style.color = "#3cff75";
  }
  else if(delta < 0){
    el.innerText = `since last update ${delta}`;
    el.style.color = "#ff5c5c";
  }
  else{
    el.innerText = "since last update no change";
    el.style.color = "#aaa";
  }
}

/* =========================
   CHART (WITH AXIS + LABELS)
========================= */
function draw(data){

  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = 340;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const values = data.map(d => d.members || 0);

  const max = Math.max(...values);
  const min = Math.min(...values);

  const paddingLeft = 50;
  const paddingBottom = 25;

  const w = canvas.width - paddingLeft;
  const h = canvas.height - paddingBottom;

  /* GRID + Y AXIS LABELS */
  ctx.fillStyle = "rgba(255,255,255,0.4)";
  ctx.font = "10px Arial";

  for(let i=0;i<=5;i++){

    const y = (h/5)*i;
    const value = Math.round(max - ((max-min)/5)*i);

    ctx.strokeStyle = "rgba(255,255,255,0.06)";
    ctx.beginPath();
    ctx.moveTo(paddingLeft, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();

    ctx.fillText(value.toLocaleString(), 5, y + 3);
  }

  /* LINE */
  ctx.beginPath();

  data.forEach((d,i)=>{

    const x = paddingLeft + (i/(data.length-1))*w;

    const y =
      h -
      ((d.members-min)/((max-min)||1))*h;

    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.strokeStyle = "#5865f2";
  ctx.lineWidth = 2;
  ctx.stroke();

  /* X AXIS TIME LABELS */
  ctx.fillStyle = "rgba(255,255,255,0.4)";
  ctx.font = "10px Arial";

  const step = Math.max(1, Math.floor(data.length / 5));

  data.forEach((d,i)=>{

    if(i % step === 0){

      const x = paddingLeft + (i/(data.length-1))*w;
      const time = new Date(d.created_at).toLocaleTimeString();

      ctx.fillText(time, x - 20, canvas.height - 5);
    }
  });
}

</script>

</body>
</html>
