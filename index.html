<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Discord Analytics Dashboard</title>

<style>

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:#0b0d12;
  color:white;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

/* HERO */
.hero{
  display:flex;
  align-items:center;
  gap:16px;
  padding:18px;
  border-radius:14px;
  background:#141826;
  border:1px solid rgba(255,255,255,0.06);
}

.hero img{
  width:70px;
  height:70px;
  border-radius:14px;
  object-fit:cover;
}

.hero h1{
  margin:0;
  font-size:24px;
}

/* GRID */
.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

.card{
  background:#141826;
  padding:16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.05);
}

.card-title{
  font-size:12px;
  opacity:0.6;
}

.card-value{
  font-size:30px;
  margin-top:8px;
  font-weight:700;
}

/* CHART */
.chart{
  margin-top:20px;
  background:#141826;
  border-radius:12px;
  padding:12px;
  border:1px solid rgba(255,255,255,0.05);
}

canvas{
  width:100%;
  height:300px;
  display:block;
}

</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <img id="serverIcon" />
    <div>
      <h1 id="serverName">Loading...</h1>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-title">Members</div>
      <div class="card-value" id="members">-</div>
    </div>

    <div class="card">
      <div class="card-title">Online</div>
      <div class="card-value" id="online">-</div>
    </div>

    <div class="card">
      <div class="card-title">Peak</div>
      <div class="card-value" id="peak">-</div>
    </div>
  </div>

  <div class="chart">
    <canvas id="chart"></canvas>
  </div>

</div>

<!-- =========================
     SUPABASE
========================= -->
<script type="module">

import { createClient } from "https://cdn.skypack.dev/@supabase/supabase-js@2";

/* CONFIG */
const SUPABASE_URL = "https://xyskshqnljcazroqtlnr.supabase.co";
const SUPABASE_KEY = "sb_publishable_vVuIoCNeJAFwWOpEiqaqIQ_ApPGsIES";

const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: false,
    autoRefreshToken: false,
    detectSessionInUrl: false
  }
});

/* STATE */
let cache = [];
let current = null;
let previous = null;

/* BOOT (STEP 5: faster “live feel”) */
window.addEventListener("DOMContentLoaded", async () => {
  await loadGuild();
  await loadSnapshots();
  setInterval(loadSnapshots, 8000);
});

/* =========================
   GUILD INFO
========================= */
async function loadGuild(){

  const { data } = await sb
    .from("discord_guild")
    .select("*")
    .limit(1);

  if(!data?.length) return;

  const g = data[0];

  document.getElementById("serverName").innerText =
    g.name || "Unknown Server";

  if(g.icon && g.id){
    document.getElementById("serverIcon").src =
      `https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png?size=128`;
  }
}

/* =========================
   SNAPSHOTS
========================= */
async function loadSnapshots(){

  const { data, error } = await sb
    .from("discord_snapshots")
    .select("*")
    .order("created_at", { ascending:true });

  if(error || !data?.length) return;

  cache = data;

  current = data[data.length - 1];
  previous = data[data.length - 2] || current;

  render(current, previous, cache);
}

/* =========================
   STEP 3: RENDER ENGINE
========================= */
function render(current, previous, all){

  const membersNow = current.members || 0;
  const membersPrev = previous.members || 0;

  const onlineNow = current.online || 0;
  const onlinePrev = previous.online || 0;

  const memberDelta = membersNow - membersPrev;
  const onlineDelta = onlineNow - onlinePrev;

  animate("members", membersNow);
  animate("online", onlineNow);

  const peak = Math.max(...all.map(d => d.members || 0));
  animate("peak", peak);

  draw(all);

  // STEP 4: delta display
  showDelta("members", memberDelta);
  showDelta("online", onlineDelta);
}

/* =========================
   ANIMATION
========================= */
function animate(id, target){

  const el = document.getElementById(id);
  const start = parseInt(el.innerText.replace(/,/g,'')) || 0;
  const diff = target - start;

  const t0 = performance.now();

  function step(t){
    const p = Math.min((t - t0) / 400, 1);
    el.innerText = Math.floor(start + diff * p).toLocaleString();
    if(p < 1) requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

/* =========================
   STEP 4: DELTA UI
========================= */
function showDelta(id, delta){

  let el = document.getElementById(id + "_delta");

  if(!el){
    el = document.createElement("div");
    el.id = id + "_delta";
    el.style.fontSize = "12px";
    el.style.opacity = "0.7";
    document.getElementById(id).parentNode.appendChild(el);
  }

  if(delta > 0){
    el.innerText = `+${delta} since last update`;
    el.style.color = "#3cff75";
  } else if(delta < 0){
    el.innerText = `${delta} since last update`;
    el.style.color = "#ff5c5c";
  } else {
    el.innerText = "no change";
    el.style.color = "#aaa";
  }
}

/* =========================
   CHART
========================= */
function draw(data){

  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = 300;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(data.length < 2) return;

  const values = data.map(d => d.members || 0);

  const max = Math.max(...values);
  const min = Math.min(...values);

  ctx.beginPath();

  data.forEach((d,i)=>{

    const x = (i/(data.length-1))*canvas.width;
    const y = canvas.height - ((d.members-min)/((max-min)||1))*canvas.height;

    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.strokeStyle = "#5865f2";
  ctx.lineWidth = 2;
  ctx.stroke();
}

</script>

</body>
</html>
