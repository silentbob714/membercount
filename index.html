<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Discord Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:#0b0d12;
  color:white;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

/* HERO */
.hero{
  display:flex;
  align-items:center;
  gap:16px;
  padding:18px;
  border-radius:14px;
  background:#151925;
  border:1px solid rgba(255,255,255,0.06);
}

.hero img{
  width:70px;
  height:70px;
  border-radius:14px;
}

.hero h1{
  margin:0;
  font-size:24px;
}

.status{
  font-size:13px;
  opacity:0.7;
  margin-top:4px;
}

/* DEBUG */
#debug{
  margin-top:12px;
  font-size:12px;
  color:#ff6b6b;
  white-space:pre-wrap;
}

/* GRID */
.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

.card{
  background:#141826;
  padding:16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.05);
}

.card-title{
  font-size:12px;
  opacity:0.6;
}

.card-value{
  font-size:30px;
  margin-top:8px;
  font-weight:700;
}

/* CHART */
.chart{
  margin-top:20px;
  background:#141826;
  border-radius:12px;
  padding:12px;
  border:1px solid rgba(255,255,255,0.05);
}

canvas{
  width:100%;
  height:300px;
}

</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <img id="serverIcon" />
    <div>
      <h1 id="serverName">Loading...</h1>
      <div class="status">Discord Analytics Dashboard</div>
    </div>
  </div>

  <div id="debug"></div>

  <div class="grid">
    <div class="card">
      <div class="card-title">Members</div>
      <div class="card-value" id="members">-</div>
    </div>

    <div class="card">
      <div class="card-title">Online</div>
      <div class="card-value" id="online">-</div>
    </div>

    <div class="card">
      <div class="card-title">Peak</div>
      <div class="card-value" id="peak">-</div>
    </div>
  </div>

  <div class="chart">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>

/* CONFIG */
const SUPABASE_URL = "https://xyskshqnljcazroqtlnr.supabase.co";
const SUPABASE_KEY = "sb_publishable_vVuIoCNeJAFwWOpEiqaqIQ_ApPGsIES";

/* INIT */
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let cache = [];

/* DEBUG HELPER */
function debug(msg){
  document.getElementById("debug").innerText = msg;
  console.log(msg);
}

/* BOOT */
window.addEventListener("DOMContentLoaded", async () => {
  await loadGuild();
  await loadSnapshots();

  setInterval(loadSnapshots, 10000);
});

/* GUILD */
async function loadGuild(){

  const { data, error } = await supabase
    .from("discord_guild")
    .select("*")
    .limit(1);

  if(error){
    debug("Guild error: " + error.message);
    return;
  }

  if(!data || !data.length){
    debug("No guild data found (check RLS or table)");
    return;
  }

  const g = data[0];

  document.getElementById("serverName").innerText = g.name || "Unknown";

  if(g.icon && g.id){
    document.getElementById("serverIcon").src =
      `https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png`;
  }

  debug("Guild loaded successfully ✔");
}

/* SNAPSHOTS */
async function loadSnapshots(){

  const { data, error } = await supabase
    .from("discord_snapshots")
    .select("*")
    .order("created_at", { ascending:true });

  if(error){
    debug("Snapshot error: " + error.message);
    return;
  }

  if(!data || data.length === 0){
    debug("No snapshot data (check RLS or inserts)");
    setValues(0,0,0);
    return;
  }

  cache = data;

  const latest = data[data.length - 1];

  const members = latest.members ?? 0;
  const online = latest.online ?? 0;

  const peak = Math.max(...data.map(d => d.members || 0));

  setValues(members, online, peak);
  draw(data);

  debug("Snapshots loaded ✔ rows: " + data.length);
}

/* UI */
function setValues(m,o,p){
  animate("members", m);
  animate("online", o);
  animate("peak", p);
}

/* ANIMATION */
function animate(id, target){

  const el = document.getElementById(id);
  if(!el) return;

  const start = parseInt(el.innerText.replace(/,/g,'')) || 0;
  const diff = target - start;
  const t0 = performance.now();

  function step(t){
    const p = Math.min((t - t0) / 400, 1);
    el.innerText = Math.floor(start + diff * p).toLocaleString();
    if(p < 1) requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

/* CHART */
function draw(data){

  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = 300;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(data.length < 2) return;

  const vals = data.map(d => d.members || 0);

  const max = Math.max(...vals);
  const min = Math.min(...vals);

  ctx.beginPath();

  data.forEach((d,i)=>{

    const x = (i/(data.length-1))*canvas.width;
    const y = canvas.height - ((d.members-min)/((max-min)||1))*canvas.height;

    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.strokeStyle = "#5865f2";
  ctx.lineWidth = 2;
  ctx.stroke();
}

</script>

</body>
</html>
