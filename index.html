<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MeshOS Discord Analytics</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f1115;
  color: white;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 100%;
  max-width: 1000px;
}

.header {
  display: flex;
  align-items: center;
  gap: 20px;
}

.icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-top: 30px;
}

.card {
  background: #1b1d23;
  padding: 20px;
  border-radius: 12px;
}

.value {
  font-size: 32px;
  margin-top: 10px;
}

canvas {
  width: 100%;
  margin-top: 30px;
  background: #1b1d23;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img id="icon" class="icon"/>
    <div>
      <h1 id="name">Loading...</h1>
      <p id="desc">Stat-style analytics dashboard</p>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div>Total Members</div>
      <div class="value" id="members">-</div>
    </div>

    <div class="card">
      <div>Online</div>
      <div class="value" id="online">-</div>
    </div>

    <div class="card">
      <div>Peak</div>
      <div class="value" id="peak">-</div>
    </div>
  </div>

  <canvas id="chart" height="250"></canvas>

</div>

<script>

const SUPABASE_URL = "https://xyskshqnljcazroqtlnr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5c2tzaHFubGpjYXpyb3F0bG5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDI5OTMsImV4cCI6MjA5NDI3ODk5M30.5cdvwI73AoH296s6lrWGlbqbQSACriyMF4x16-jQPVY";

async function load() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/discord_snapshots?select=*`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const data = await res.json();

  const members = data[data.length - 1].members;
  const online = data[data.length - 1].online;

  document.getElementById("members").innerText =
    members.toLocaleString();

  document.getElementById("online").innerText =
    online.toLocaleString();

  const peak = Math.max(...data.map(d => d.members));
  document.getElementById("peak").innerText =
    peak.toLocaleString();

  draw(data);
}

function draw(data) {
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  canvas.width = 1000;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const max = Math.max(...data.map(d => d.members));
  const min = Math.min(...data.map(d => d.members));

  ctx.beginPath();
  ctx.strokeStyle = "#5865f2";

  data.forEach((d,i) => {
    const x = (i/(data.length-1))*canvas.width;
    const y = canvas.height -
      ((d.members-min)/((max-min)||1))*canvas.height;

    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.stroke();
}

load();

</script>

</body>
</html>
